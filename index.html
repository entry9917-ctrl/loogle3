<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loogle</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
            background: #ffffff;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .logo-box { margin-bottom: 40px; user-select: none; animation: fadeIn 0.8s ease-out; }
        .loogle-text { font-size: 80px; font-weight: bold; letter-spacing: -4px; }
        .c-blue { color: #4285F4; } .c-red { color: #EA4335; }
        .c-yellow { color: #FBBC05; } .c-green { color: #34A853; }

        .search-wrapper { width: 90%; max-width: 580px; text-align: center; }
        .custom-input-box {
            width: 100%; padding: 18px 30px; font-size: 18px;
            border: 1px solid #dfe1e5; border-radius: 50px; outline: none;
            box-sizing: border-box; transition: all 0.3s ease;
            box-shadow: 0 1px 6px rgba(32,33,36,0.1);
        }
        .custom-input-box:hover, .custom-input-box:focus {
            box-shadow: 0 4px 15px rgba(32,33,36,0.2); border-color: rgba(223,225,229,0);
        }

        .info-text { margin-top: 60px; color: #5f6368; font-size: 14px; text-align: center; }
        @media (max-width: 600px) { .loogle-text { font-size: 56px; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="logo-box">
        <span class="loogle-text">
            <span class="c-blue">L</span><span class="c-red">o</span><span class="c-yellow">o</span><span class="c-blue">g</span><span class="c-green">l</span><span class="c-red">e</span>
        </span>
    </div>

    <div class="search-wrapper">
        <form action="https://www.google.com/search" method="GET" id="search-form">
            <input type="text" name="q" id="search-input" class="custom-input-box" placeholder="검색어 또는 URL 입력" autofocus autocomplete="off">
        </form>
    </div>

    <div class="info-text">
        모두의 브라우저, Loogle. <br>
        <div style="font-size: 12px; color: #9aa0a6; margin-top: 10px;">© 2026. 엘도라도. All rights reserved.</div>
    </div>

    <script>
        const input = document.getElementById('search-input');
        const form = document.getElementById('search-form');

        input.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault(); // 기본 폼 제출 방지 후 로직 실행
                const query = input.value.trim();
                
                if (!query) return;

                // 1. URL 주소인지 확인
                if (query.startsWith('http://') || query.startsWith('https://')) {
                    window.location.href = query;
                } else if (query.includes('.') && !query.includes(' ')) {
                    window.location.href = "https://" + query;
                } else {
                    // 2. 주소가 아니면 구글 검색 폼 제출
                    form.submit();
                }
            }
        });
    </script>
</body>
</html>
